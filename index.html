<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EME AIR INTERNATIONAL - Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <header class="no-print">
        <div class="brand">
            <img src="assets/logo.png" alt="EME AIR INTERNATIONAL" class="brand-logo">
        </div>
        <div class="tools-top">
            <button id="themeToggle" class="btn-icon" onclick="toggleDarkMode()">🌙</button>
            <div class="converter-mini">
                <span>USD to BDT: </span>
                <input type="number" id="usdInput" placeholder="USD">
                <span>×</span>
                <input type="number" id="rateInput" value="122">
                <strong id="bdtResult">৳0</strong>
            </div>
        </div>
    </header>

    <div class="analysis-grid no-print">
        <div class="chart-container">
            <canvas id="categoryChart"></canvas>
        </div>
        <div class="template-box">
            <h3>Quick Templates</h3>
            <div class="template-grid">
                <button onclick="ticketSalePrompt()" class="btn-ticket-special">🎟️ Ticket Sale (Prompt)</button>
                <button onclick="applyTemplate('Visa Fee - Thailand', 6500, 0, 'Tourist Visa')" style="background: #ecfdf5; color: #065f46;">🇹🇭 Thai Visa (6.5k In)</button>
                <button onclick="applyTemplate('Visa Fee - Malaysia', 4500, 0, 'Tourist Visa')" style="background: #ecfdf5; color: #065f46;">🇲🇾 Malay Visa (4.5k In)</button>
                <button onclick="applyTemplate('Office Rent', 0, 32000, 'Monthly Rent')">🏢 Office Rent</button>
                <button onclick="applyTemplate('Water Bill', 0, 1000, 'Utility')">💧 Water</button>
                <button onclick="applyTemplate('Internet Bill', 0, 1200, 'Utility')">🌐 Internet</button>
            </div>
        </div>
        <div class="sync-box">
            <h3>Cloud Database</h3>
            <input type="month" id="monthPicker" value="2025-12">
            <div style="display: flex; gap: 8px; margin-top: 10px;">
                <button id="saveLedger" class="btn btn-save" style="flex:1">💾 Save</button>
                <button id="loadLedger" class="btn btn-print" style="flex:1; background: var(--primary);">📂 Load</button>
            </div>
            <div id="saveStatus" style="font-size: 11px; margin-top: 8px; text-align:center;"></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="card"><p class="label">Total In</p><p class="in-text" id="totalIn">৳0</p></div>
        <div class="card"><p class="label">Total Out</p><p class="out-text" id="totalOut">৳0</p></div>
        <div id="netCard" class="card highlight"><p class="label">Net Cash Position</p><p id="netBalance">৳0</p></div>
    </div>

    <div class="actions no-print">
        <button onclick="addRow()" class="btn btn-add">+ New Entry</button>
        <button onclick="downloadExcel()" class="btn btn-excel">📊 Excel</button>
        <button onclick="window.print()" class="btn btn-print">🖨️ PDF Export</button>
        <input type="text" id="searchInput" placeholder="🔍 Search records..." class="search-bar">
    </div>

    <table id="ledger">
        <thead>
            <tr>
                <th style="width: 130px;">Date</th>
                <th>Particular / Description</th>
                <th style="width: 120px;">Cash In</th>
                <th style="width: 120px;">Cash Out</th>
                <th style="width: 140px;">Balance</th>
                <th>Remark</th>
                <th class="no-print" style="width: 80px;">Actions</th>
            </tr>
        </thead>
        <tbody id="ledgerBody"></tbody>
    </table>

    <footer class="no-print" style="text-align: center; font-size: small; margin-top: 20px;">
        Developed by Devnox IT
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
